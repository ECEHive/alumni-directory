name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily rebuild so the site stays in sync with Airtable.
    - cron: "23 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      # Geocode results live in the Actions cache, not the repo. The run_id key
      # never matches exactly, so every run restores the newest geocode-cache-*
      # entry and saves a fresh one afterwards (cache entries are immutable).
      - name: Restore geocode cache
        uses: actions/cache@v4
        with:
          path: data/geocode-cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: |
            geocode-cache-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          ALUMNI_SECRET_KEY: ${{ secrets.ALUMNI_SECRET_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
